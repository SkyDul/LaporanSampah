name: Deploy Web ke EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi SSH ke EC2 dan Jalankan Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            sudo docker stop web-laporsampah || true
            sudo docker rm web-laporsampah || true
            
            # Mendownload web dari github ke EC2
            if [ ! -d "tugas-web" ]; then
              git clone https://github.com/SkyDul/LaporanSampah.git tugas-web
            fi
            
            cd tugas-web
            git pull origin main
            
            # Membangun dan menjalankan Docker
            sudo docker build -t web-app-image -f src/Dockerfile .
            sudo docker run -d -p 80:80 --name web-laporsampah web-app-image

